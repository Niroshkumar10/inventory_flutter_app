name: inventory_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
# For mobile PDF generation
  pdf: ^3.10.8
  
  # For CSV file saving
  csv: ^5.0.3

  # Firebase packages
  firebase_core: ^2.32.0  # Downgrade for compatibility
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  
  # State management
  provider: ^6.1.2
  
  # Local storage
  shared_preferences: ^2.2.2
  animated_splash_screen: ^1.3.0  # Optional: For animated splash

  
  # Charts
  fl_chart: ^0.69.2
  
  # Utilities
  uuid: ^4.4.0
  intl: ^0.18.1
  
  # PDF Export (Core packages)
  # printing: ^5.13.1  # For PDF printing
  
  get: ^4.6.6  # Add this for GetX
  http: ^1.1.0  # For API calls

  # Platform-specific (will be handled conditionally)
  path_provider: ^2.1.1  # For mobile file system
  open_file: ^3.2.1  
  
  # REMOVE THESE - they cause build errors:
  # file_saver: ^0.1.1
  universal_html: ^2.2.3
  # excel: ^2.1.0


  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.0
  permission_handler: ^11.0.1
  url_launcher: ^6.2.0

crypto: ^3.0.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/logo/app_logo.png